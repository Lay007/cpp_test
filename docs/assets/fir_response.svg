<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
<title id="title">FIR frequency response</title><desc id="desc">Engineering plot of low-pass FIR frequency response with normalized frequency and dB axis ticks.</desc>
<style>.bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:12}.axis{stroke:#0f172a;stroke-width:2}.grid{stroke:#e2e8f0;stroke-width:1}.minor{stroke:#f1f5f9;stroke-width:1}.curve{fill:none;stroke:#2563eb;stroke-width:3.5}.cut{stroke:#ef4444;stroke-width:2;stroke-dasharray:7 6}.t{font:700 25px Arial;fill:#0f172a}.s{font:400 14px Arial;fill:#475569}.tick{font:400 12px Arial;fill:#334155}.lab{font:700 13px Arial;fill:#0f172a}.tag{font:700 12px Arial;fill:#ef4444}</style>
<rect class="bg" width="980" height="430"/><text x="42" y="44" class="t">FIR low-pass frequency response</text><text x="42" y="70" class="s">Windowed-sinc FIR · Blackman window · DC-normalized taps</text>
<rect x="82" y="96" width="820" height="250" class="panel"/>
<!-- grid x: 0..0.5 -->
<g><line x1="82" y1="296" x2="902" y2="296" class="grid"/><line x1="82" y1="246" x2="902" y2="246" class="grid"/><line x1="82" y1="196" x2="902" y2="196" class="grid"/><line x1="82" y1="146" x2="902" y2="146" class="grid"/><line x1="82" y1="96" x2="902" y2="96" class="grid"/><line x1="246" y1="96" x2="246" y2="346" class="grid"/><line x1="410" y1="96" x2="410" y2="346" class="grid"/><line x1="574" y1="96" x2="574" y2="346" class="grid"/><line x1="738" y1="96" x2="738" y2="346" class="grid"/></g>
<line x1="82" y1="346" x2="902" y2="346" class="axis"/><line x1="82" y1="96" x2="82" y2="346" class="axis"/>
<path class="curve" d="M82 116 C170 116 210 118 250 126 C286 135 318 165 344 244 C364 306 392 340 430 350 C520 356 672 351 902 352"/>
<line x1="279" y1="96" x2="279" y2="346" class="cut"/><text x="286" y="114" class="tag">fc≈0.12</text>
<!-- ticks x -->
<g class="tick"><text x="78" y="368">0</text><text x="236" y="368">0.1</text><text x="400" y="368">0.2</text><text x="564" y="368">0.3</text><text x="728" y="368">0.4</text><text x="892" y="368">0.5</text></g>
<g class="tick"><text x="43" y="350">-80</text><text x="43" y="300">-60</text><text x="43" y="250">-40</text><text x="43" y="200">-20</text><text x="56" y="150">0</text><text x="48" y="101">+3</text></g>
<text x="405" y="405" class="lab">Normalized frequency, cycles/sample</text><text x="22" y="260" class="lab" transform="rotate(-90 22 260)">Magnitude, dB</text>
<text x="610" y="126" class="s">passband / transition / stopband view</text>
</svg>
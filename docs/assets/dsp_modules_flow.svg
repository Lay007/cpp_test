<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">DSP modules flow</title>
  <desc id="desc">Block diagram of DSP modules implemented in cpp-dsp-showcase.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.bg{fill:#f8fafc}.title{font:700 30px Arial;fill:#0f172a}.subtitle{font:400 16px Arial;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18;filter:url(#shadow)}.boxCore{fill:#eef6ff;stroke:#60a5fa;stroke-width:2;rx:18;filter:url(#shadow)}.boxVal{fill:#f0fdf4;stroke:#86efac;stroke-width:2;rx:18;filter:url(#shadow)}.h{font:700 18px Arial;fill:#0f172a}.p{font:400 14px Arial;fill:#475569}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}</style></defs>
  <rect class="bg" width="1200" height="620"/>
  <text x="60" y="58" class="title">DSP modules</text><text x="60" y="88" class="subtitle">Correctness-first C++17 signal-processing kernels with clear optimization paths</text>
  <rect x="60" y="205" width="210" height="105" class="box"/><text x="90" y="243" class="h">Signal sources</text><text x="90" y="271" class="p">tone generation</text><text x="90" y="292" class="p">test vectors / helpers</text>
  <rect x="340" y="145" width="230" height="105" class="boxCore"/><text x="370" y="183" class="h">FIR design</text><text x="370" y="211" class="p">windowed-sinc low-pass</text><text x="370" y="232" class="p">Blackman + DC norm</text>
  <rect x="340" y="305" width="230" height="105" class="boxCore"/><text x="370" y="343" class="h">Convolution</text><text x="370" y="371" class="p">SIMD / FFT FIR</text><text x="370" y="392" class="p">baseline + acceleration</text>
  <rect x="640" y="145" width="230" height="105" class="boxCore"/><text x="670" y="183" class="h">Goertzel</text><text x="670" y="211" class="p">single-bin tone power</text><text x="670" y="232" class="p">batched SIMD option</text>
  <rect x="640" y="305" width="230" height="105" class="boxCore"/><text x="670" y="343" class="h">GCC-PHAT</text><text x="670" y="371" class="p">delay estimation</text><text x="670" y="392" class="p">FFT acceleration path</text>
  <rect x="640" y="465" width="230" height="80" class="boxCore"/><text x="670" y="499" class="h">Rational resampler</text><text x="670" y="527" class="p">upsample-filter-decimate</text>
  <rect x="950" y="205" width="190" height="105" class="boxVal"/><text x="980" y="243" class="h">Validation</text><text x="980" y="271" class="p">GoogleTest / CTest</text><text x="980" y="292" class="p">smoke + perf tests</text>
  <rect x="950" y="375" width="190" height="105" class="boxVal"/><text x="980" y="413" class="h">Reports</text><text x="980" y="441" class="p">benchmark Markdown</text><text x="980" y="462" class="p">CI artifacts</text>
  <path class="arrow" d="M270 258 C300 258, 310 198, 340 198"/><path class="arrow" d="M270 258 C300 258, 310 358, 340 358"/><path class="arrow" d="M570 198 L640 198"/><path class="arrow" d="M570 358 L640 358"/><path class="arrow" d="M455 410 C455 505, 570 505, 640 505"/><path class="arrow" d="M870 198 C910 198, 920 258, 950 258"/><path class="arrow" d="M870 358 C910 358, 920 258, 950 258"/><path class="arrow" d="M870 505 C925 505, 920 428, 950 428"/><path class="arrow dash" d="M1045 310 L1045 375"/>
</svg>

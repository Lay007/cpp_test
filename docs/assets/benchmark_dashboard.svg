<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="590" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc">
<title id="title">DSP benchmark dashboard</title>
<desc id="desc">Benchmark dashboard generated from real benchmark report.</desc>
<style>.bg{fill:#f8fafc}.title{font:700 32px Arial;fill:#0f172a}.sub{font:400 16px Arial;fill:#475569}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.axis{stroke:#334155;stroke-width:2}.grid{stroke:#e2e8f0;stroke-width:1}.bar{fill:#2563eb}.txt{font:400 12px Arial;fill:#334155}.label{font:700 12px Arial;fill:#0f172a}.val{font:700 12px Arial;fill:#2563eb}.small{font:400 12px Arial;fill:#64748b}.legend{fill:#fff;stroke:#cbd5e1;stroke-width:1.6;rx:14}</style>
<rect class="bg" width="1200" height="590"/>
<text x="60" y="60" class="title">DSP Benchmark Dashboard</text>
<text x="60" y="88" class="sub">Generated from actual benchmark report: build/reports/dsp_performance.md</text>
<rect x="60" y="120" width="1080" height="400" class="card"/>
<line x1="155" y1="415" x2="955" y2="415" class="axis"/>
<line x1="155" y1="145" x2="155" y2="415" class="axis"/>
<line x1="155" y1="347.5" x2="955" y2="347.5" class="grid"/>
<text x="88" y="351.5" class="txt">0.83 ms</text>
<line x1="155" y1="280.0" x2="955" y2="280.0" class="grid"/>
<text x="88" y="284.0" class="txt">1.66 ms</text>
<line x1="155" y1="212.5" x2="955" y2="212.5" class="grid"/>
<text x="88" y="216.5" class="txt">2.49 ms</text>
<line x1="155" y1="145.0" x2="955" y2="145.0" class="grid"/>
<text x="88" y="149.0" class="txt">3.32 ms</text>
<rect x="195" y="354.2" width="52" height="60.8" class="bar"/>
<text x="193" y="346.2" class="val">0.747 ms</text>
<text x="177" y="439" class="label">FIR SIMD</text>
<rect x="291" y="145.0" width="52" height="270.0" class="bar"/>
<text x="289" y="137.0" class="val">3.316 ms</text>
<text x="273" y="439" class="label">FIR FFT</text>
<rect x="387" y="407.2" width="52" height="7.8" class="bar"/>
<text x="385" y="399.2" class="val">0.096 ms</text>
<text x="369" y="439" class="label">Gtz scalar</text>
<rect x="483" y="408.5" width="52" height="6.5" class="bar"/>
<text x="481" y="400.5" class="val">0.080 ms</text>
<text x="465" y="439" class="label">Gtz SIMD</text>
<rect x="865" y="155" width="230" height="92" class="legend"/>
<text x="890" y="188" class="label">Real benchmark data</text>
<rect x="890" y="205" width="18" height="18" class="bar"/>
<text x="920" y="219" class="txt">Average runtime, ms</text>
<text x="60" y="552" class="small">Lower is better. Values depend on CPU, compiler, build type, input sizes and CI runner load.</text>
</svg>
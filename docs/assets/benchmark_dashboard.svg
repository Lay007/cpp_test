<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">DSP benchmark dashboard</title>
<desc id="desc">Illustrative benchmark dashboard comparing scalar, SIMD and FFT DSP kernels.</desc>
<style>
.bg{fill:#f8fafc}.title{font:700 32px Arial;fill:#0f172a}.sub{font:400 16px Arial;fill:#475569}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.h{font:700 18px Arial;fill:#0f172a}.t{font:400 14px Arial;fill:#475569}.bar1{fill:#94a3b8}.bar2{fill:#60a5fa}.bar3{fill:#22c55e}.axis{stroke:#334155;stroke-width:2}.grid{stroke:#e2e8f0;stroke-width:1}.label{font:700 14px Arial;fill:#0f172a}.small{font:400 12px Arial;fill:#64748b}
</style>
<rect class="bg" width="1200" height="520"/>
<text x="60" y="60" class="title">DSP Benchmark Dashboard</text>
<text x="60" y="88" class="sub">Scalar baseline vs AVX2 SIMD vs FFT-oriented acceleration</text>
<rect x="60" y="125" width="1080" height="330" class="card"/>
<line x1="160" y1="390" x2="1080" y2="390" class="axis"/>
<line x1="160" y1="180" x2="160" y2="390" class="axis"/>
<line x1="160" y1="320" x2="1080" y2="320" class="grid"/>
<line x1="160" y1="250" x2="1080" y2="250" class="grid"/>
<text x="180" y="155" class="h">Relative speedup, illustrative scale</text>
<text x="105" y="394" class="small">1x</text><text x="105" y="324" class="small">5x</text><text x="98" y="254" class="small">10x</text>
<text x="210" y="420" class="label">FIR</text><text x="450" y="420" class="label">Goertzel</text><text x="690" y="420" class="label">RMS</text><text x="900" y="420" class="label">GCC-PHAT</text>
<rect x="200" y="360" width="40" height="30" class="bar1"/><rect x="250" y="250" width="40" height="140" class="bar2"/><rect x="300" y="210" width="40" height="180" class="bar3"/>
<rect x="440" y="360" width="40" height="30" class="bar1"/><rect x="490" y="285" width="40" height="105" class="bar2"/>
<rect x="680" y="360" width="40" height="30" class="bar1"/><rect x="730" y="240" width="40" height="150" class="bar2"/>
<rect x="910" y="360" width="40" height="30" class="bar1"/><rect x="960" y="230" width="40" height="160" class="bar3"/>
<rect x="790" y="145" width="300" height="92" class="card"/>
<rect x="815" y="170" width="18" height="18" class="bar1"/><text x="845" y="184" class="t">Scalar reference</text>
<rect x="815" y="198" width="18" height="18" class="bar2"/><text x="845" y="212" class="t">AVX2 / FMA</text>
<rect x="815" y="226" width="18" height="18" class="bar3"/><text x="845" y="240" class="t">FFT / algorithmic acceleration</text>
<text x="60" y="490" class="small">Actual values depend on CPU, compiler, build type and input sizes. Generate local report with benchmark_report target.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
<title id="title">DSP benchmark dashboard</title>
<desc id="desc">Illustrative benchmark dashboard comparing scalar, SIMD and FFT DSP kernels.</desc>
<style>
.bg{fill:#f8fafc}.title{font:700 32px Arial;fill:#0f172a}.sub{font:400 16px Arial;fill:#475569}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.legend{fill:#fff;stroke:#cbd5e1;stroke-width:1.7;rx:14}.h{font:700 18px Arial;fill:#0f172a}.t{font:400 14px Arial;fill:#475569}.bar1{fill:#94a3b8}.bar2{fill:#60a5fa}.bar3{fill:#22c55e}.axis{stroke:#334155;stroke-width:2}.grid{stroke:#e2e8f0;stroke-width:1}.label{font:700 14px Arial;fill:#0f172a}.small{font:400 12px Arial;fill:#64748b}.legendTitle{font:700 14px Arial;fill:#0f172a}
</style>
<rect class="bg" width="1200" height="560"/>
<text x="60" y="60" class="title">DSP Benchmark Dashboard</text>
<text x="60" y="88" class="sub">Scalar baseline vs AVX2 SIMD vs FFT-oriented acceleration</text>
<rect x="60" y="125" width="1080" height="370" class="card"/>

<!-- Plot area: 120..820, legend area: 860..1110 -->
<text x="135" y="160" class="h">Relative speedup, illustrative scale</text>
<line x1="150" y1="405" x2="820" y2="405" class="axis"/>
<line x1="150" y1="190" x2="150" y2="405" class="axis"/>
<line x1="150" y1="348" x2="820" y2="348" class="grid"/>
<line x1="150" y1="292" x2="820" y2="292" class="grid"/>
<line x1="150" y1="236" x2="820" y2="236" class="grid"/>
<text x="102" y="409" class="small">1x</text>
<text x="102" y="352" class="small">5x</text>
<text x="95" y="296" class="small">10x</text>
<text x="95" y="240" class="small">15x</text>

<!-- FIR -->
<text x="205" y="435" class="label">FIR</text>
<rect x="185" y="370" width="32" height="35" class="bar1"/>
<rect x="225" y="292" width="32" height="113" class="bar2"/>
<rect x="265" y="250" width="32" height="155" class="bar3"/>

<!-- Goertzel -->
<text x="365" y="435" class="label">Goertzel</text>
<rect x="365" y="370" width="32" height="35" class="bar1"/>
<rect x="405" y="316" width="32" height="89" class="bar2"/>

<!-- RMS -->
<text x="545" y="435" class="label">RMS</text>
<rect x="535" y="370" width="32" height="35" class="bar1"/>
<rect x="575" y="280" width="32" height="125" class="bar2"/>

<!-- GCC-PHAT -->
<text x="695" y="435" class="label">GCC-PHAT</text>
<rect x="700" y="370" width="32" height="35" class="bar1"/>
<rect x="740" y="238" width="32" height="167" class="bar3"/>

<!-- Dedicated legend column -->
<rect x="860" y="172" width="240" height="150" class="legend"/>
<text x="885" y="202" class="legendTitle">Legend</text>
<rect x="885" y="222" width="18" height="18" class="bar1"/>
<text x="915" y="237" class="t">Scalar reference</text>
<rect x="885" y="252" width="18" height="18" class="bar2"/>
<text x="915" y="267" class="t">AVX2 / FMA</text>
<rect x="885" y="282" width="18" height="18" class="bar3"/>
<text x="915" y="297" class="t">FFT acceleration</text>

<text x="60" y="530" class="small">Actual values depend on CPU, compiler, build type and input sizes. Generate a local report with the benchmark_report target.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360"><style>.bg{fill:#f8fafc}.axis{stroke:#334155;stroke-width:2}.grid{stroke:#e2e8f0}.curve{fill:none;stroke:#22c55e;stroke-width:4}.peak{stroke:#ef4444;stroke-width:2;stroke-dasharray:6 4}.t{font:700 24px Arial;fill:#0f172a}.s{font:400 14px Arial;fill:#475569}</style><rect class="bg" width="900" height="360"/><text x="42" y="44" class="t">Goertzel tone detection</text><text x="42" y="68" class="s">Single-bin detector across candidate frequencies</text><line x1="80" y1="300" x2="840" y2="300" class="axis"/><line x1="80" y1="95" x2="80" y2="300" class="axis"/><line x1="80" y1="240" x2="840" y2="240" class="grid"/><line x1="80" y1="180" x2="840" y2="180" class="grid"/><path class="curve" d="M80 280 L200 260 L300 220 L350 120 L400 90 L450 140 L550 220 L700 260 L840 280"/><line x1="400" y1="95" x2="400" y2="300" class="peak"/><text x="360" y="85" class="s">target tone</text><text x="360" y="335" class="s">frequency</text><text x="28" y="205" class="s" transform="rotate(-90 28 205)">power</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
<title id="title">Goertzel tone detection</title><desc id="desc">IEEE-style plot of normalized Goertzel power versus frequency with ticks and units.</desc>
<style>.bg{fill:#fff}.panel{fill:#fff;stroke:#111827;stroke-width:1.2}.axis{stroke:#111827;stroke-width:1.6}.grid{stroke:#d1d5db;stroke-width:.8;stroke-dasharray:2 4}.curve{fill:none;stroke:#111827;stroke-width:2.2}.peak{stroke:#dc2626;stroke-width:1.6;stroke-dasharray:6 5}.t{font:700 24px Arial;fill:#111827}.s{font:400 14px Arial;fill:#374151}.tick{font:400 12px Arial;fill:#111827}.lab{font:700 13px Arial;fill:#111827}.ann{font:700 12px Arial;fill:#dc2626}</style>
<rect class="bg" width="980" height="430"/>
<text x="42" y="42" class="t">Goertzel tone detection</text>
<text x="42" y="68" class="s">Single-bin detector response across candidate frequencies</text>
<rect x="90" y="95" width="810" height="255" class="panel"/>
<g class="grid">
<line x1="90" y1="299" x2="900" y2="299"/><line x1="90" y1="248" x2="900" y2="248"/><line x1="90" y1="197" x2="900" y2="197"/><line x1="90" y1="146" x2="900" y2="146"/><line x1="90" y1="95" x2="900" y2="95"/>
<line x1="90" y1="95" x2="90" y2="350"/><line x1="252" y1="95" x2="252" y2="350"/><line x1="414" y1="95" x2="414" y2="350"/><line x1="576" y1="95" x2="576" y2="350"/><line x1="738" y1="95" x2="738" y2="350"/><line x1="900" y1="95" x2="900" y2="350"/>
</g>
<line x1="90" y1="350" x2="900" y2="350" class="axis"/><line x1="90" y1="95" x2="90" y2="350" class="axis"/>
<path class="curve" d="M90 334 L170 326 L252 300 L333 250 L392 158 L430 112 L470 150 L540 235 L620 292 L738 320 L820 330 L900 336"/>
<line x1="430" y1="95" x2="430" y2="350" class="peak"/>
<text x="442" y="114" class="ann">target tone</text>
<g class="tick"><text x="86" y="373">0</text><text x="240" y="373">2k</text><text x="402" y="373">4k</text><text x="564" y="373">6k</text><text x="726" y="373">8k</text><text x="884" y="373">10k</text></g>
<g class="tick"><text x="58" y="354">0</text><text x="46" y="303">0.2</text><text x="46" y="252">0.4</text><text x="46" y="201">0.6</text><text x="46" y="150">0.8</text><text x="58" y="99">1</text></g>
<text x="438" y="408" class="lab">Frequency, Hz</text>
<text x="24" y="265" class="lab" transform="rotate(-90 24 265)">Normalized power</text>
</svg>
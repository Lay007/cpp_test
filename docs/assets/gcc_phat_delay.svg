<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
<title id="title">GCC-PHAT delay estimation</title><desc id="desc">IEEE-style plot of GCC-PHAT correlation versus lag in samples.</desc>
<style>.bg{fill:#fff}.panel{fill:#fff;stroke:#111827;stroke-width:1.2}.axis{stroke:#111827;stroke-width:1.6}.grid{stroke:#d1d5db;stroke-width:.8;stroke-dasharray:2 4}.curve{fill:none;stroke:#111827;stroke-width:2.2}.peak{stroke:#dc2626;stroke-width:1.6;stroke-dasharray:6 5}.t{font:700 24px Arial;fill:#111827}.s{font:400 14px Arial;fill:#374151}.tick{font:400 12px Arial;fill:#111827}.lab{font:700 13px Arial;fill:#111827}.ann{font:700 12px Arial;fill:#dc2626}</style>
<rect class="bg" width="980" height="430"/><text x="42" y="42" class="t">GCC-PHAT delay estimation</text><text x="42" y="68" class="s">Cross-correlation peak identifies integer-sample delay</text>
<rect x="90" y="95" width="810" height="255" class="panel"/>
<g class="grid"><line x1="90" y1="299" x2="900" y2="299"/><line x1="90" y1="248" x2="900" y2="248"/><line x1="90" y1="197" x2="900" y2="197"/><line x1="90" y1="146" x2="900" y2="146"/><line x1="90" y1="95" x2="900" y2="95"/><line x1="171" y1="95" x2="171" y2="350"/><line x1="333" y1="95" x2="333" y2="350"/><line x1="495" y1="95" x2="495" y2="350"/><line x1="657" y1="95" x2="657" y2="350"/><line x1="819" y1="95" x2="819" y2="350"/></g>
<line x1="90" y1="350" x2="900" y2="350" class="axis"/><line x1="90" y1="95" x2="90" y2="350" class="axis"/>
<path class="curve" d="M90 330 L170 322 L250 306 L330 280 L390 238 L450 160 L495 116 L540 160 L600 238 L670 286 L760 314 L900 330"/>
<line x1="495" y1="95" x2="495" y2="350" class="peak"/><text x="506" y="114" class="ann">estimated delay</text>
<g class="tick"><text x="78" y="373">-100</text><text x="160" y="373">-80</text><text x="321" y="373">-40</text><text x="490" y="373">0</text><text x="648" y="373">40</text><text x="810" y="373">80</text></g>
<g class="tick"><text x="58" y="354">0</text><text x="46" y="303">0.2</text><text x="46" y="252">0.4</text><text x="46" y="201">0.6</text><text x="46" y="150">0.8</text><text x="58" y="99">1</text></g>
<text x="438" y="408" class="lab">Lag, samples</text><text x="24" y="266" class="lab" transform="rotate(-90 24 266)">Normalized correlation</text>
</svg>
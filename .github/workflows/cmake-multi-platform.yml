name: C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python deps
        run: pip install numpy matplotlib

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON -DDSP_ENABLE_AVX2=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Tests
        run: ctest --test-dir build --output-on-failure

      - name: Benchmark
        run: cmake --build build --target benchmark_report

      - name: Generate plots
        run: python tools/generate_benchmark_plot.py

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/assets/*.png docs/benchmark.md || true
          git commit -m "Auto-update benchmark artifacts" || echo "No changes"
          git push
